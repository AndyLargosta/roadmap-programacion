<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINGÜICODE | Aprende a Programar</title>

    <!-- Fuente Inter de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        /* Colores y fuentes custom del proyecto */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        penguin: {
                            dark: '#17192b',    /* Fondo principal */
                            darker: '#121422',  /* Fondo más oscuro (header, cards) */
                            yellow: '#fca311',  /* Amarillo para botones y acentos */
                            pink: '#e63946',    /* Rojo/rosa para acentos secundarios */
                            text: '#e2e8f0'     /* Texto principal */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            /* Botón amarillo con efecto 3D */
            .btn-primary {
                @apply bg-penguin-yellow hover:bg-yellow-400 text-penguin-darker px-6 py-2 rounded-full font-bold shadow-[0_4px_0_#d97706] hover:shadow-[0_2px_0_#d97706] hover:translate-y-[2px] transition-all cursor-pointer inline-block text-center;
            }
            /* Botón secundario con borde rosa */
            .btn-secondary {
                @apply bg-transparent border-2 border-penguin-pink text-penguin-pink hover:bg-penguin-pink hover:text-white px-6 py-2 rounded-full font-bold transition-all cursor-pointer inline-block text-center;
            }
            /* Alerta de éxito */
            .alert-success {
                @apply bg-green-500/10 border border-green-500 text-green-400 px-4 py-3 rounded-xl flex items-center gap-3 font-medium my-4;
            }
            /* Alerta de error */
            .alert-error {
                @apply bg-penguin-pink/10 border border-penguin-pink text-penguin-pink px-4 py-3 rounded-xl flex items-center gap-3 font-medium my-4;
            }
            /* Card glassmorphism */
            .card-penguin {
                @apply bg-penguin-darker/50 border border-gray-800 rounded-3xl p-8 shadow-2xl backdrop-blur-sm hover:border-penguin-yellow/50 transition-all;
            }
        }
    </style>
</head>

<body class="bg-penguin-dark text-penguin-text font-sans min-h-screen flex flex-col antialiased selection:bg-penguin-yellow selection:text-penguin-darker">

    <!-- 
        HEADER: fijo arriba con efecto de vidrio esmerilado 
    -->
    <header class="bg-penguin-darker/90 backdrop-blur-md sticky top-0 z-50 border-b border-white/5 shadow-xl">

        <!-- 
            NAV: w-full para ocupar todo el ancho,
            px-6 para padding lateral cómodo 
        -->
        <nav class="w-full px-6 py-4 flex items-center">
            
            <!-- 
                LOGO (izquierda):
                mr-auto empuja todo lo demás hacia la derecha 
            -->
            <a href="/" class="text-2xl font-black tracking-tighter flex items-center gap-2 group mr-auto">
                <!-- inline-block necesario para que el rotate funcione -->
                <span class="text-penguin-yellow group-hover:rotate-12 transition-transform inline-block">&lt;🐧&gt;</span>
                <!-- PingüiCode junto con la ü correcta -->
                <span class="text-white">Pingüi</span><span class="text-penguin-yellow">Code</span>
            </a>
            
            <!-- 
                LOGOUT (derecha):
                ml-auto lo empuja al extremo derecho
                pr-4 para que no quede pegado al borde 
            -->
            <div class="ml-auto pr-4">
                <a href="/logout" class="btn-primary text-sm uppercase tracking-widest">Logout</a>
            </div>

        </nav>
    </header>

    <!-- 
        MAIN: flex-grow ocupa todo el espacio entre header y footer 
    -->
    <main class="container mx-auto px-6 py-12 flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 
        FOOTER: siempre al fondo con borde superior sutil 
    -->
    <footer class="py-5 border-t border-white/5 bg-penguin-darker/50">
        <div class="container mx-auto px-6 text-center flex flex-col items-center">
            
            <!-- Logo del footer -->
            <img src="../static/images/footer.jpg" 
                alt="PingüiCode Logo"
                class="h-10 w-auto opacity-80 hover:opacity-100 transition-opacity mb-1">

            <!-- Créditos del hackathon -->
            <p class="text-gray-500 text-sm font-medium">
                Hackathon 2026 — 
                <span class="text-white">Herramienta creada para aprender a programar—</span> 
                <span class="text-penguin-pink font-bold">Creada por "El mejor grupo"</span>
            </p>

        </div>
    </footer>

</body>
<script>
    function activarComodin() {
        
        const opciones = document.querySelectorAll(".opcion");

        opciones.forEach(opcion => {

            if (opcion.dataset.comodin === "true") {

                opcion.classList.add(
                    "bg-gray-700",
                    "border-gray-500",
                    "opacity-50",
                    "pointer-events-none"
                );

                const radio = opcion.querySelector("input");
                radio.disabled = true;
            }

        });

    }
</script>
</html>

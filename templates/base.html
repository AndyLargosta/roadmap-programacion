!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin CodePro | Aprende a Programar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        penguin: {
                            dark: '#17192b',    /* El fondo oscuro exacto de la captura del roadmap */
                            darker: '#121422',  /* Un tono más oscuro para el navbar y footer */
                            yellow: '#fca311',  /* El amarillo/naranja del logo y los nodos */
                            pink: '#e63946',    /* El rosado/rojo de la capa del pingüino */
                            text: '#e2e8f0'     /* Texto claro para buena lectura */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-penguin-dark text-penguin-text font-sans min-h-screen flex flex-col antialiased selection:bg-penguin-yellow selection:text-penguin-darker">

    <header class="bg-penguin-darker/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800 shadow-lg">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            
            <a href="/" class="text-2xl font-black tracking-tight flex items-center gap-2 group">
                <span class="text-penguin-yellow group-hover:text-penguin-pink transition-colors duration-300">&lt; &gt;</span> 
                <span class="text-white">Penguin</span><span class="text-gray-400 font-light">CodePro</span>
            </a>
            
            <ul class="flex items-center space-x-8 font-medium">
                <li>
                    <a href="/roadmap" class="text-gray-300 hover:text-penguin-yellow transition-colors duration-200 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                        Mi Roadmap
                    </a>
                </li>
                <li>
                    <a href="/login" class="bg-penguin-yellow hover:bg-yellow-400 text-penguin-darker px-6 py-2 rounded-full font-bold shadow-[0_4px_0_#d97706] hover:shadow-[0_2px_0_#d97706] hover:translate-y-[2px] transition-all">
                        Ingresar
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow flex flex-col relative">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-penguin-darker text-gray-500 text-sm text-center py-6 mt-auto border-t border-gray-800">
        <p>Hackathon 2026 - Hecho con <span class="text-penguin-pink">♥</span> por el equipo CodePro</p>
    </footer>

</body>
</html>

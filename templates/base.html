<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINGÜICODE | Aprende a Programar</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        penguin: {
                            dark:   '#17192b',
                            darker: '#121422',
                            yellow: '#fca311',
                            pink:   '#e63946',
                            text:   '#e2e8f0'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .btn-primary {
                @apply bg-penguin-yellow hover:bg-yellow-400 text-penguin-darker
                       px-4 py-2 sm:px-6 rounded-full font-bold
                       shadow-[0_4px_0_#d97706] hover:shadow-[0_2px_0_#d97706]
                       hover:translate-y-[2px] transition-all cursor-pointer
                       inline-block text-center text-sm sm:text-base;
            }
            .btn-secondary {
                @apply bg-transparent border-2 border-penguin-pink text-penguin-pink
                       hover:bg-penguin-pink hover:text-white
                       px-4 py-2 sm:px-6 rounded-full font-bold
                       transition-all cursor-pointer inline-block text-center
                       text-sm sm:text-base;
            }
            .alert-success {
                @apply bg-green-500/10 border border-green-500 text-green-400
                       px-4 py-3 rounded-xl flex items-center gap-3 font-medium my-4;
            }
            .alert-error {
                @apply bg-penguin-pink/10 border border-penguin-pink text-penguin-pink
                       px-4 py-3 rounded-xl flex items-center gap-3 font-medium my-4;
            }
            .card-penguin {
                @apply bg-penguin-darker/50 border border-gray-800 rounded-3xl
                       p-4 sm:p-8 shadow-2xl backdrop-blur-sm
                       hover:border-penguin-yellow/50 transition-all;
            }
        }
    </style>

    <style>
        /* estilos del logo igual al login */
        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #F4B942, #e8a020);
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #252848;
            box-shadow: 0 4px 14px rgba(244,185,66,.35);
            flex-shrink: 0;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -.5px;
            color: #FFFFFF;
        }
        .brand-name span {
            color: #F4B942;
        }
        .brand-year {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            color: #F4B942;
            background: rgba(244,185,66,.12);
            border: 1px solid rgba(244,185,66,.3);
            border-radius: 5px;
            padding: 2px 6px;
            margin-left: 4px;
        }
    </style>
</head>

<!-- h-screen overflow-hidden evita que el body haga scroll -->
<body class="bg-penguin-dark text-penguin-text font-sans h-screen overflow-hidden
             flex flex-col antialiased
             selection:bg-penguin-yellow selection:text-penguin-darker">

    <!-- header fijo arriba -->
    <header class="bg-penguin-darker/90 backdrop-blur-md z-50
                   border-b border-white/5 shadow-xl flex-shrink-0">
        <nav class="w-full px-4 sm:px-6 py-3 sm:py-4 flex items-center gap-4">

            <!-- logo igual al login -->
            <a href="/" class="flex items-center gap-3 mr-auto no-underline">
                <div class="brand-icon">&lt;/&gt;</div>
                <div style="display:flex; align-items:center; gap:6px;">
                    <span class="brand-name">PINGÜI<span>CODE</span></span>
                    <span class="brand-year">beta</span>
                </div>
            </a>

            <!-- logout -->
            <div class="ml-auto">
                <a href="/logout"
                   class="btn-primary uppercase tracking-widest text-xs sm:text-sm">
                    Logout
                </a>
            </div>

        </nav>
    </header>

    <!-- main ocupa el espacio entre header y footer sin scroll propio -->
    <main class="flex-1 min-h-0 w-full overflow-hidden">
        {% block content %}
        {% endblock %}
    </main>

    <!-- footer fijo abajo -->
    <footer class="py-3 sm:py-4 border-t border-white/5 bg-penguin-darker/50 flex-shrink-0">
        <div class="w-full px-4 sm:px-6 text-center flex flex-col items-center gap-1">

            <img src="../static/images/footer.jpg"
                 alt="PingüiCode Logo"
                 class="h-8 sm:h-10 w-auto opacity-80 hover:opacity-100 transition-opacity">

            <p class="text-gray-500 text-xs sm:text-sm font-medium">
                Hackathon 2026 —
                <span class="text-white">Herramienta creada para aprender a programar —</span>
                <span class="text-penguin-pink font-bold">Creada por "El mejor grupo"</span>
            </p>

        </div>
    </footer>

</body>

<script>
    function activarComodin() {
        const opciones = document.querySelectorAll(".opcion");
        opciones.forEach(opcion => {
            if (opcion.dataset.comodin === "true") {
                opcion.classList.add(
                    "bg-gray-700",
                    "border-gray-500",
                    "opacity-50",
                    "pointer-events-none"
                );
                const radio = opcion.querySelector("input");
                radio.disabled = true;
            }
        });
    }
</script>
</html>

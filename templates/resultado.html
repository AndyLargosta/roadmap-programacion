<div class="modal-overlay" id="resultado-modal">
    <div class="modal-content text-center">
        
        {% if resultado.aprobado %}
            <div class="icono-resultado">✅</div>
            <h2 class="titulo-exito">¡Respuesta Correcta!</h2>
            <p class="texto-resultado">¡Excelente trabajo! Has demostrado tu conocimiento y puedes avanzar al siguiente desafío.</p>
        {% else %}
            <div class="icono-resultado">❌</div>
            <h2 class="titulo-error">Respuesta Incorrecta</h2>
            <p class="texto-resultado">No te desanimes. Repasa los conceptos de este nivel y vuelve a intentarlo cuando estés listo.</p>
        {% endif %}
        
        <button class="btn-continuar" onclick="cerrarModal()">Continuar en el Roadmap</button>
    </div>
</div>


<style>

.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    display: flex; justify-content: center; align-items: center;
    z-index: 1000;
}
.modal-content.text-center {
    background: white; padding: 35px 25px; border-radius: 12px;
    max-width: 400px; width: 90%; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    font-family: sans-serif;
}
.icono-resultado {
    font-size: 60px; margin-bottom: 15px;
}
.titulo-exito { color: #28a745; margin-bottom: 10px; font-size: 24px; }
.titulo-error { color: #dc3545; margin-bottom: 10px; font-size: 24px; }
.texto-resultado { font-size: 16px; color: #555; margin-bottom: 25px; line-height: 1.5; }

.btn-continuar {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: #6c757d; color: white; font-size: 16px; font-weight: bold;
    cursor: pointer; transition: background 0.2s;
}
.btn-continuar:hover { background: #5a6268; }
</style>

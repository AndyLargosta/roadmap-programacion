<div class="bg-[#252848] p-10 border-2 rounded-2xl w-full mx-auto text-center shadow-2xl 
            {% if resultado.aprobado %}border-[#28a745]{% else %}border-[#dc3545]{% endif %}">

    {% if resultado.aprobado %}
        <div class="text-7xl mb-4 animate-bounce">✅</div>
        <h2 class="text-2xl font-black text-[#28a745] mb-4">¡Respuesta Correcta!</h2>
        <p class="text-[#8B8FB5] mb-8 leading-relaxed">
            ¡Excelente trabajo! Has demostrado tu conocimiento y sumaste progreso en tu roadmap.
        </p>
    {% else %}
        <div class="text-7xl mb-4">❌</div>
        <h2 class="text-2xl font-black text-[#dc3545] mb-4">Respuesta Incorrecta</h2>
        <p class="text-[#8B8FB5] mb-8 leading-relaxed">
            No te desanimes. Repasa los conceptos de este nivel y vuelve a intentarlo cuando estés listo.
        </p>
    {% endif %}

    <button type="button" onclick="cerrarModal()" class="block w-full py-4 bg-[#353760] hover:bg-[#5C5F82] text-white font-bold rounded-xl transition-colors hover:scale-[1.02]">
        Continuar en el Roadmap
    </button>
</div>

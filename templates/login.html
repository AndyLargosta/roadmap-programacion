<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceder · CodePro 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0e14;
      --surface:  #13171f;
      --border:   #1e2430;
      --accent:   #00e5a0;
      --accent2:  #0094ff;
      --danger:   #ff4d6d;
      --text:     #e8ecf4;
      --muted:    #5a6480;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Background grid + glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .45;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(0,229,160,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: relative;
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 44px;
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px; font-weight: 500;
      color: #0b0e14;
    }
    .brand-name {
      font-size: 18px; font-weight: 800; letter-spacing: -.4px;
    }
    .brand-year {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      background: rgba(0,229,160,.1);
      border: 1px solid rgba(0,229,160,.2);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 2px;
    }

    /* ── Heading ── */
    h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -.6px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px;
      font-weight: 400;
    }
    .subtitle span {
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    /* ── Error banner ── */
    .error-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,77,109,.08);
      border: 1px solid rgba(255,77,109,.25);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 22px;
      font-size: 13px;
      color: #ff6b85;
      animation: fadeSlide .3s ease;
    }
    .error-banner svg { flex-shrink: 0; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg.icon {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }
    .input-wrap:focus-within svg.icon { color: var(--accent); }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px 13px 42px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.12);
    }
    input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,77,109,.1);
    }

    /* email hint badge */
    .email-hint {
      margin-top: 6px;
      font-size: 11.5px;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 18px;
      transition: opacity .25s;
      opacity: 0;
    }
    .email-hint.show { opacity: 1; }
    .email-hint.exists { color: var(--accent); }
    .email-hint.new    { color: var(--accent2); }

    /* password toggle */
    .pwd-toggle {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px;
      transition: color .2s;
    }
    .pwd-toggle:hover { color: var(--text); }

    /* ── Submit button ── */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      color: #0b0e14;
      cursor: pointer;
      letter-spacing: .02em;
      position: relative;
      overflow: hidden;
      transition: opacity .2s, transform .15s;
    }
    .btn:hover  { opacity: .92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn .btn-text { position: relative; z-index: 1; }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: white;
      opacity: 0;
      transition: opacity .2s;
    }
    .btn:hover::after { opacity: .05; }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .footer-note strong { color: var(--text); font-weight: 600; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(11,14,20,.4);
      border-top-color: #0b0e14;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">&lt;/&gt;</div>
      <span class="brand-name">CodePro</span>
      <span class="brand-year">2026</span>
    </div>

    <!-- Heading -->
    <h1>Bienvenido de nuevo</h1>
    <p class="subtitle">Ingresá tu email para continuar · <span>hackaton_codepro</span></p>

    <!-- Error from Flask -->
    {% if error %}
    <div class="error-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>

      <!-- Email -->
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            value="{{ email|default('') }}"
            autocomplete="email"
            required
          />
        </div>
        <div class="email-hint" id="emailHint"></div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner hidden" id="spinner"></span>
        <span class="btn-text" id="btnText">Continuar</span>
      </button>
    </form>

    <!-- Footer -->
    <p class="footer-note">
      ¿Primera vez? <strong>Se creará tu cuenta automáticamente.</strong><br>
      Solo ingresá tu email y elegí una contraseña.
    </p>

  </div>
</div>

<script>
  const emailInput  = document.getElementById('email');
  const emailHint   = document.getElementById('emailHint');
  const pwdToggle   = document.getElementById('pwdToggle');
  const pwdInput    = document.getElementById('password');
  const eyeIcon     = document.getElementById('eyeIcon');
  const submitBtn   = document.getElementById('submitBtn');
  const spinner     = document.getElementById('spinner');
  const btnText     = document.getElementById('btnText');
  const form        = document.getElementById('loginForm');

  /* ── Email check (debounced) ── */
  let debounceTimer;
  const EYE_OPEN  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const EYE_SLASH = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function isValidEmail(e) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }

  emailInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = emailInput.value.trim().toLowerCase();

    if (!isValidEmail(val)) {
      emailHint.className = 'email-hint';
      emailHint.textContent = '';
      return;
    }

    debounceTimer = setTimeout(async () => {
      try {
        const res  = await fetch('/check-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: val })
        });
        const data = await res.json();

        if (data.exists) {
          emailHint.textContent = '✓ Cuenta existente — ingresá tu contraseña';
          emailHint.className   = 'email-hint show exists';
          btnText.textContent   = 'Iniciar sesión';
        } else {
          emailHint.textContent = '+ Cuenta nueva — elegí una contraseña para registrarte';
          emailHint.className   = 'email-hint show new';
          btnText.textContent   = 'Crear cuenta';
        }
      } catch (_) {
        emailHint.className = 'email-hint';
      }
    }, 400);
  });

  /* ── Password toggle ── */
  pwdToggle.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type       = show ? 'text' : 'password';
    eyeIcon.innerHTML   = show ? EYE_SLASH : EYE_OPEN;
  });

  /* ── Submit spinner ── */
  form.addEventListener('submit', (e) => {
    if (!emailInput.value.trim() || !pwdInput.value.trim()) return;
    submitBtn.disabled      = true;
    spinner.classList.remove('hidden');
    btnText.textContent     = 'Verificando...';
  });
</script>
</body>
</html>

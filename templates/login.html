<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceder · PINGÜICODE</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1d36;
      --surface:   #252848;
      --border:    #2e3260;
      --accent:    #F4B942;
      --accent2:   #ffd580;
      --danger:    #ff4d6d;
      --text:      #FFFFFF;
      --muted:     #9499cc;
      --radius:    14px;
      --navy:      #252848;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── Background dots ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(244,185,66,.15) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: .5;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(244,185,66,.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Clouds ── */
    .clouds { position: fixed; top: 8%; left: 0; right: 0; height: 70px; pointer-events: none; z-index: 1; }
    .cloud { position: absolute; background: rgba(255,255,255,.13); border-radius: 50px; animation: drift linear infinite; }
    .cloud::before, .cloud::after { content: ''; position: absolute; background: rgba(255,255,255,.13); border-radius: 50%; }
    .c1 { width:80px;height:24px;top:10px;animation-duration:38s;animation-delay:-5s; }
    .c1::before { width:40px;height:34px;top:-16px;left:12px; }
    .c1::after  { width:30px;height:24px;top:-11px;left:38px; }
    .c2 { width:55px;height:18px;top:35px;animation-duration:52s;animation-delay:-20s; }
    .c2::before { width:28px;height:24px;top:-11px;left:9px; }
    .c3 { width:100px;height:28px;top:5px;animation-duration:45s;animation-delay:-12s; }
    .c3::before { width:50px;height:40px;top:-20px;left:14px; }
    .c3::after  { width:36px;height:28px;top:-14px;left:50px; }
    .c4 { width:70px;height:20px;top:45px;animation-duration:60s;animation-delay:-32s; }
    .c4::before { width:36px;height:30px;top:-14px;left:10px; }
    @keyframes drift { from { left:-130px; } to { left:110%; } }

    /* ── Layout ── */
    .page {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1.5px solid rgba(244,185,66,.3);
      border-radius: 24px;
      padding: 44px 40px 40px;
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
      overflow: visible;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      border-radius: 24px 24px 0 0;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), #e8a020);
      border-radius: 14px;
      display: grid; place-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px; font-weight: 700;
      color: var(--navy);
      box-shadow: 0 4px 14px rgba(244,185,66,.35);
    }
    .brand-name {
      font-size: 22px; font-weight: 900; letter-spacing: -.5px;
      color: #FFFFFF;
    }
    .brand-name span {
      color: var(--accent);
    }
    .brand-year {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      background: rgba(244,185,66,.12);
      border: 1px solid rgba(244,185,66,.3);
      border-radius: 5px;
      padding: 2px 7px;
      margin-left: 4px;
    }

    /* ── Heading ── */
    h1 {
      font-size: 26px; font-weight: 900; letter-spacing: -.6px;
      line-height: 1.2;
      margin-bottom: 6px;
      color: #FFFFFF;
    }
    .subtitle {
      font-size: 13px; color: var(--muted);
      margin-bottom: 30px;
      font-weight: 600;
    }
    .subtitle span {
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    /* ── Error banner ── */
    .error-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,77,109,.08);
      border: 1px solid rgba(255,77,109,.25);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 22px;
      font-size: 13px;
      color: #ff6b85;
      animation: fadeSlide .3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }
    .input-wrap svg.icon {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }
    .input-wrap:focus-within svg.icon { color: var(--accent); }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px 13px 44px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color: rgba(148,153,204,.5); }
    input:focus {
      border-color: var(--accent);
      background: rgba(244,185,66,.06);
      box-shadow: 0 0 0 3px rgba(244,185,66,.15);
    }
    input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,77,109,.1);
    }

    .email-hint {
      margin-top: 6px;
      font-size: 11.5px;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 18px;
      transition: opacity .25s;
      opacity: 0;
    }
    .email-hint.show { opacity: 1; }
    .email-hint.exists { color: #5de89e; }
    .email-hint.new    { color: var(--accent); }

    .pwd-toggle {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px;
      transition: color .2s;
    }
    .pwd-toggle:hover { color: var(--text); }

    /* ── Submit button ── */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #e8a020);
      border: none; border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 800;
      color: var(--navy);
      cursor: pointer;
      letter-spacing: .04em;
      position: relative;
      overflow: hidden;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(244,185,66,.35);
    }
    .btn:hover  { opacity: .9; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,185,66,.45); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn .btn-text { position: relative; z-index: 1; }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .footer-note strong { color: var(--text); font-weight: 700; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(37,40,72,.4);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* ── TRANSITION OVERLAY ── */
    .transition-overlay {
      position: fixed; inset: 0;
      background: var(--navy);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .transition-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .transition-overlay .msg {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -.3px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .4s ease .3s, transform .4s ease .3s;
    }
    .transition-overlay.active .msg {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── FLYING PENGUIN ── */
    .flying-penguin {
      width: 140px;
      opacity: 0;
      transform: translateX(-120px) translateY(60px) rotate(-20deg);
      transition: opacity .2s ease, transform 1.2s cubic-bezier(.22,1,.36,1);
    }
    .transition-overlay.active .flying-penguin {
      opacity: 1;
      transform: translateX(0px) translateY(-20px) rotate(10deg);
    }
    .transition-overlay.fly-out .flying-penguin {
      opacity: 0;
      transform: translateX(180px) translateY(-100px) rotate(30deg);
      transition: opacity .5s ease, transform 1s cubic-bezier(.55,0,1,.45);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
      h1 { font-size: 22px; }
    }
    @media (max-width: 360px) {
      .card { padding: 24px 18px 20px; }
    }
  </style>
</head>
<body>

<!-- Clouds -->
<div class="clouds">
  <div class="cloud c1" style="left:3%"></div>
  <div class="cloud c2" style="left:28%"></div>
  <div class="cloud c3" style="left:62%"></div>
  <div class="cloud c4" style="left:82%"></div>
</div>

<!-- Transition Overlay -->
<div class="transition-overlay" id="transitionOverlay">
  <img class="flying-penguin" id="flyingPenguin" src="{{ url_for('static', filename='images/pinguino.png') }}" alt="PingüiCode mascot" />
  <div class="msg" id="transitionMsg">¡Preparando tu roadmap! 🚀</div>
</div>

<div class="page">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">&lt;/&gt;</div>
      <div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="brand-name">PINGÜI<span>CODE</span></span>
          <span class="brand-year">beta</span>
        </div>
      </div>
    </div>

    <!-- Heading -->
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresá tu email para continuar · <span>hackaton_codepro</span></p>

    <!-- Error from Flask -->
    {% if error %}
    <div class="error-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>

      <!-- Email -->
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" name="email" placeholder="tu@email.com"
            value="{{ email|default('') }}" autocomplete="email" required />
        </div>
        <div class="email-hint" id="emailHint"></div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="••••••••"
            autocomplete="current-password" required />
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner hidden" id="spinner"></span>
        <span class="btn-text" id="btnText">Continuar</span>
      </button>
    </form>

    <!-- Footer -->
    <p class="footer-note">
      ¿Primera vez? <strong>Se creará tu cuenta automáticamente.</strong><br>
      Solo ingresá tu email y elegí una contraseña.
    </p>

  </div>
</div>

<script>
  const emailInput  = document.getElementById('email');
  const emailHint   = document.getElementById('emailHint');
  const pwdToggle   = document.getElementById('pwdToggle');
  const pwdInput    = document.getElementById('password');
  const eyeIcon     = document.getElementById('eyeIcon');
  const submitBtn   = document.getElementById('submitBtn');
  const spinner     = document.getElementById('spinner');
  const btnText     = document.getElementById('btnText');
  const form        = document.getElementById('loginForm');
  const overlay     = document.getElementById('transitionOverlay');
  const penguin     = document.getElementById('flyingPenguin');
  const transMsg    = document.getElementById('transitionMsg');

  const EYE_OPEN  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const EYE_SLASH = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function isValidEmail(e) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }

  /* ── Email check ── */
  let debounceTimer;
  emailInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = emailInput.value.trim().toLowerCase();
    if (!isValidEmail(val)) {
      emailHint.className = 'email-hint';
      emailHint.textContent = '';
      return;
    }
    debounceTimer = setTimeout(async () => {
      try {
        const res  = await fetch('/check-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: val })
        });
        const data = await res.json();
        if (data.exists) {
          emailHint.textContent = '✓ Cuenta existente — ingresá tu contraseña';
          emailHint.className   = 'email-hint show exists';
          btnText.textContent   = 'Iniciar sesión';
        } else {
          emailHint.textContent = '+ Cuenta nueva — elegí una contraseña para registrarte';
          emailHint.className   = 'email-hint show new';
          btnText.textContent   = 'Crear cuenta';
        }
      } catch (_) {
        emailHint.className = 'email-hint';
      }
    }, 400);
  });

  /* ── Password toggle ── */
  pwdToggle.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type     = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? EYE_SLASH : EYE_OPEN;
  });

  /* ── Submit with flying penguin transition ── */
  form.addEventListener('submit', (e) => {
    if (!emailInput.value.trim() || !pwdInput.value.trim()) return;
    e.preventDefault();

    submitBtn.disabled  = true;
    spinner.classList.remove('hidden');
    btnText.textContent = 'Verificando...';

    // Activate overlay
    overlay.classList.add('active');

    // Messages cycle
    const messages = [
      '¡Bienvenido a PingüiCode! 🐧',
      'Cargando tu roadmap...',
      'Preparando todo para vos ✨'
    ];
    let mi = 0;
    transMsg.textContent = messages[mi];
    const msgInterval = setInterval(() => {
      mi = (mi + 1) % messages.length;
      transMsg.style.opacity = '0';
      setTimeout(() => {
        transMsg.textContent = messages[mi];
        transMsg.style.opacity = '1';
      }, 200);
    }, 900);

    // After animation, fly out and submit
    setTimeout(() => {
      clearInterval(msgInterval);
      overlay.classList.add('fly-out');
      setTimeout(() => {
        form.submit();
      }, 800);
    }, 2800);
  });
</script>
</body>
</html>
